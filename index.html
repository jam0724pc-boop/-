<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>時間割アプリ</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPKyokashotai&display=swap');

    body {
      font-family: 'BIZ UDPKyokashotai', 'UD デジタル 教科書体 N-R', sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #f0f2f5;
      color: #333;
      -webkit-user-select: none;
      user-select: none;
    }

    button, input {
      font-family: inherit;
      -webkit-tap-highlight-color: transparent; 
    }

    .day-tabs {
      display: flex;
      margin-bottom: 0;
      background-color: #cfd8dc;
      border-radius: 8px 8px 0 0;
      overflow: hidden;
      border: 2px solid #546e7a;
      border-bottom: none;
    }

    .tab-btn {
      flex: 1;
      padding: 15px 5px;
      background-color: transparent;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .tab-btn:active {
      background-color: #b0bec5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      border: 2px solid #546e7a;
    }

    th, td {
      border: 1px solid #90a4ae;
      text-align: center;
      padding: 10px 5px;
      height: 70px;
      font-size: 16px;
    }

    .time-col {
      background-color: #eceff1;
      width: 70px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .time-col:active {
      background-color: #cfd8dc;
    }

    .subject-cell, .time-cell {
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .subject-cell:active, .time-cell:active {
      background-color: #e3f2fd;
    }

    .black-cell {
      background-color: #e0e0e0;
      cursor: default;
    }

    .action-btn {
      margin-top: 20px;
      padding: 15px 20px;
      background-color: #ff5252;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 18px;
      font-weight: bold;
    }

    /* モーダルのスタイル */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      text-align: center;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 25px;
    }

    .subject-card {
      padding: 12px 18px;
      background-color: #e1f5fe;
      border: 1px solid #0288d1;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
    }

    .custom-input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    #customInput {
      flex: 1;
      padding: 12px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      -webkit-user-select: auto;
      user-select: auto;
    }

    .custom-btn {
      padding: 12px 20px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
    }

    .close-btn {
      padding: 12px 25px;
      background-color: #9e9e9e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="day-tabs">
  <button class="tab-btn"><ruby>月<rt>げつ</rt></ruby></button>
  <button class="tab-btn"><ruby>火<rt>か</rt></ruby></button>
  <button class="tab-btn"><ruby>水<rt>すい</rt></ruby></button>
  <button class="tab-btn"><ruby>木<rt>もく</rt></ruby></button>
  <button class="tab-btn"><ruby>金<rt>きん</rt></ruby></button>
</div>

<div id="timetable-container">
  <table id="timetable">
    <tbody>
      <tr>
        <th class="time-col">4<ruby>時間目<rt>じかんめ</rt></ruby></th>
        <td class="black-cell subject-cell day-mon" data-id="mon-4-3"></td>
        <td data-id="mon-4-4" class="subject-cell day-mon"><ruby>自立<rt>じりつ</rt></ruby><br>(POS)</td>
        <td data-id="tue-4-3" class="subject-cell day-tue"><ruby>生単<rt>せいたん</rt></ruby></td>
        <td data-id="tue-4-4" class="subject-cell day-tue">POS</td>
        <td colspan="2" class="black-cell subject-cell day-wed" data-id="wed-4"></td>
        <td colspan="2" data-id="thu-4" class="subject-cell day-thu"><ruby>自立<rt>じりつ</rt></ruby></td>
        <td colspan="2" class="black-cell subject-cell day-fri" data-id="fri-4"></td>
      </tr>
      <tr class="dismissal-row">
        <th class="time-col"><ruby>下校<rt>げこう</rt></ruby></th>
        <td data-id="mon-out-3" class="time-cell day-mon">14:00</td>
        <td data-id="mon-out-4" class="time-cell day-mon">15:30</td>
        <td colspan="2" data-id="tue-out" class="time-cell day-tue">15:30</td>
        <td colspan="2" data-id="wed-out" class="time-cell day-wed">14:00</td>
        <td colspan="2" data-id="thu-out" class="time-cell day-thu">15:30</td>
        <td colspan="2" data-id="fri-out" class="time-cell day-fri">14:00</td>
      </tr>
    </tbody>
  </table>
</div>
<button id="resetBtn" class="action-btn"><ruby>変更<rt>へんこう</rt></ruby>を<ruby>初期化<rt>しょきか</rt></ruby>する</button>

<div id="cardModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"><ruby>選択<rt>せんたく</rt></ruby>・<ruby>入力<rt>にゅうりょく</rt></ruby></h3>
    
    <div id="cardContainer" class="card-container"></div>
    
    <div class="custom-input-container">
      <input type="text" id="customInput" placeholder="直接入力できます">
      <button id="customSubmitBtn" class="custom-btn">決定</button>
    </div>
    
    <button id="closeModalBtn" class="close-btn"><ruby>閉<rt>と</rt></ruby>じる</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // 編集可能にする要素をすべて取得（科目、時間、見出し、曜日タブ）
  const editables = document.querySelectorAll('td.subject-cell, td.time-cell, th.time-col, .tab-btn');
  const modal = document.getElementById('cardModal');
  const cardContainer = document.getElementById('cardContainer');
  const customInput = document.getElementById('customInput');
  const customSubmitBtn = document.getElementById('customSubmitBtn');
  const resetBtn = document.getElementById('resetBtn');
  const closeModalBtn = document.getElementById('closeModalBtn');
  
  let currentTargetEl = null;

  const subjectCards = [
    '<ruby>体育<rt>たいいく</rt></ruby>',
    '<ruby>国語<rt>こくご</rt></ruby>',
    '<ruby>音楽<rt>おんがく</rt></ruby>',
    '<ruby>図工<rt>ずこう</rt></ruby>',
    '<ruby>自立<rt>じりつ</rt></ruby>',
    '<ruby>自立<rt>じりつ</rt></ruby><br>(プール)',
    '<ruby>算数<rt>さんすう</rt></ruby>',
    'POS',
    '<ruby>生単<rt>せいたん</rt></ruby>',
    '<ruby>総合<rt>そうごう</rt></ruby>',
    '<ruby>自立<rt>じりつ</rt></ruby><br>(POS)'
  ];

  const timeCards = [
    '11:30', '13:00', '14:00', '14:30', '15:00', '15:30'
  ];

  editables.forEach(el => {
    el.addEventListener('click', () => {
      if (el.classList.contains('black-cell')) return;

      currentTargetEl = el;
      cardContainer.innerHTML = '';
      customInput.value = '';
      
      const isTimeCell = el.classList.contains('time-cell');
      const isSubjectCell = el.classList.contains('subject-cell');

      // セル（科目・時間）の場合はカードを表示、見出し・曜日の場合は直接入力のみ
      if (isTimeCell || isSubjectCell) {
        cardContainer.style.display = 'flex';
        const cardsToDisplay = isTimeCell ? timeCards : subjectCards;
        cardsToDisplay.forEach(cardHtml => {
          const btn = document.createElement('button');
          btn.className = 'subject-card';
          btn.innerHTML = cardHtml;
          btn.addEventListener('click', () => updateCell(cardHtml));
          cardContainer.appendChild(btn);
        });
      } else {
        cardContainer.style.display = 'none'; // タブや見出しはカードを出さない
      }

      modal.style.display = 'flex';
    });
  });

  function updateCell(content) {
    if (currentTargetEl) {
      currentTargetEl.innerHTML = content;
    }
    closeModal();
  }

  function closeModal() {
    modal.style.display = 'none';
    currentTargetEl = null;
  }

  customSubmitBtn.addEventListener('click', () => {
    const val = customInput.value.trim();
    if (val !== '') updateCell(val);
  });

  closeModalBtn.addEventListener('click', closeModal);

  resetBtn.addEventListener('click', () => {
    if(confirm('変更を初期化しますか？')) {
      location.reload();
    }
  });
});
</script>
</body>
</html>
